apiVersion: v1
kind: Pod
metadata:
  name: test-image-volume
  namespace: test
spec:
  containers:
  - name: shell
    command: ["sleep", "infinity"]
    image: ghcr.io/cybozu/ubuntu:24.04
    volumeMounts:
    - name: volume
      mountPath: /volume
  volumes:
  - name: volume
    image:
      reference: ghcr.io/cybozu/ubuntu:22.04
      pullPolicy: IfNotPresent
